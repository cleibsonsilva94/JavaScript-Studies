<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star wars</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <div id="app">
        <h1>{{ title }}</h1>
        <small>Olá, {{ name }}</small>
        
        <form>
            <input placeholder="Busca por nome..." v-model="searchName"/>
            <button type="button" @click="search()">Buscar</button>
        </form>

        <div class="characters">

            <div class="item" v-for="item of characters">
                <!-- Lista dinâmica de personagens renderizada com Vue (v-for + reatividade) -->
                <img :src="item.avatar" alt="item.nome" />
                <p>{{item.nome}}</p>
                <button @click="like(item.nome)">Gostei</button>
                 <button @click="remove(item.id)">Remover</button>
            </div>
        </div>
        <script type="text/javascript" src="js/vue.js"></script>
        <script type="text/javascript" src="js/app.js"></script>
</body>

</html>
